<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Nexus</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 12px;
    background: #1e1e1e; color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
  }
  h2 { font-size: 0.85rem; color: #a78bfa; margin: 0 0 12px; letter-spacing: 0.05em; text-transform: uppercase; }
  label { display: block; font-size: 0.72rem; color: #888; margin-bottom: 3px; margin-top: 10px; }
  input, select {
    width: 100%; padding: 6px 8px; border-radius: 5px;
    border: 1px solid #3a3a3a; background: #2a2a2a;
    color: #e0e0e0; font-size: 0.8rem; outline: none;
  }
  input:focus, select:focus { border-color: #a78bfa; }
  .connect-btn {
    display: block; width: 100%; margin-top: 14px;
    padding: 8px; border-radius: 6px; border: none;
    background: #a78bfa; color: #fff; font-size: 0.8rem;
    font-weight: 700; cursor: pointer; transition: opacity 0.15s;
  }
  .connect-btn:hover { opacity: 0.85; }
  .connect-btn:disabled { opacity: 0.4; cursor: default; }
  .status { margin-top: 8px; font-size: 0.7rem; text-align: center; }
  .status--ok { color: #4ade80; }
  .status--err { color: #f87171; }
  .status--pending { color: #a78bfa; }
  .divider { border: none; border-top: 1px solid #2e2e2e; margin: 14px 0; }
  .field-group { display: none; }
  .field-group.visible { display: block; }
</style>
</head>
<body>

<h2>Nexus</h2>

<!-- Auth section -->
<div id="auth-section">
  <button class="connect-btn" id="connect-btn" onclick="connectNexus()">Connect to Nexus</button>
  <p class="status" id="auth-status"></p>
</div>

<hr class="divider" />

<!-- Action-specific settings, shown after auth -->
<div class="field-group" id="settings-section">

  <!-- Raid Radar / Team Shoutout: pick a teammate -->
  <div id="field-member" class="field-group">
    <label>Teammate</label>
    <select id="member-select" onchange="saveSetting('member', this.value)">
      <option value="">Loading teammates…</option>
    </select>
  </div>

  <!-- Category Switcher: pick a category preset -->
  <div id="field-category" class="field-group">
    <label>Category</label>
    <input id="category-name" type="text" placeholder="e.g. Valorant" oninput="saveSetting('categoryName', this.value)" />
    <label>Category ID</label>
    <input id="category-id" type="text" placeholder="Twitch category ID" oninput="saveSetting('categoryId', this.value)" />
  </div>

</div>

<script>
  const NEXUS_BASE = 'https://web-production-bec6d.up.railway.app';
  let actionUUID = '';
  let context = '';
  let settings = {};
  let globalApiKey = null;
  let wsPort = null;
  let ws = null;

  // Stream Deck property inspector receives messages via window events
  window.connectElgatoStreamDeckSocket = function(port, ctx, action, appInfo, actionInfo) {
    wsPort = port;
    context = ctx;
    actionUUID = action;
    try { settings = JSON.parse(actionInfo).payload.settings || {}; } catch { settings = {}; }

    ws = new WebSocket('ws://127.0.0.1:' + port);
    ws.onopen = () => {
      ws.send(JSON.stringify({ event: 'registerPropertyInspector', uuid: ctx }));
      ws.send(JSON.stringify({ event: 'getGlobalSettings', context: ctx }));
      restoreSettings();
    };
    ws.onmessage = (evt) => {
      const msg = JSON.parse(evt.data || '{}');
      if (msg.event === 'didReceiveGlobalSettings') {
        globalApiKey = msg.payload?.settings?.apiKey || null;
        if (globalApiKey) {
          settings.apiKey = globalApiKey;
          checkAuth();
        }
      }
      if (msg.event === 'didReceiveSettings') {
        settings = msg.payload.settings || {};
        if (globalApiKey) settings.apiKey = globalApiKey; // global key always wins
        restoreSettings();
      }
    };
  };

  function send(payload) {
    if (ws && ws.readyState === 1) ws.send(JSON.stringify(payload));
  }

  function saveSettings() {
    send({ event: 'setSettings', context, payload: settings });
  }

  function saveGlobalApiKey(apiKey) {
    globalApiKey = apiKey;
    send({ event: 'setGlobalSettings', context, payload: { apiKey } });
  }

  function saveSetting(key, value) {
    settings[key] = value;
    saveSettings();
  }

  function restoreSettings() {
    // Don't checkAuth here — wait for global settings which are authoritative for apiKey
    if (settings.categoryName) document.getElementById('category-name').value = settings.categoryName;
    if (settings.categoryId) document.getElementById('category-id').value = settings.categoryId;
  }

  function setStatus(msg, type) {
    const el = document.getElementById('auth-status');
    el.textContent = msg;
    el.className = 'status status--' + type;
  }

  async function connectNexus() {
    const btn = document.getElementById('connect-btn');
    btn.disabled = true;
    setStatus('Opening Nexus login…', 'pending');

    // Generate a one-time code and open browser for auth
    const code = Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);
    window.open(NEXUS_BASE + '/oauth/streamdeck?code=' + code, '_blank');
    setStatus('Waiting for login…', 'pending');

    // Poll for the token
    let attempts = 0;
    const poll = setInterval(async () => {
      attempts++;
      if (attempts > 60) { clearInterval(poll); setStatus('Timed out — try again', 'err'); btn.disabled = false; return; }
      try {
        const res = await fetch(NEXUS_BASE + '/oauth/streamdeck/token?code=' + code);
        const data = await res.json();
        if (data.apiKey) {
          clearInterval(poll);
          settings.apiKey = data.apiKey;
          saveSettings();
          saveGlobalApiKey(data.apiKey);
          onAuthenticated();
        }
      } catch {}
    }, 2000);
  }

  async function checkAuth() {
    if (!settings.apiKey) return;
    try {
      const res = await fetch(NEXUS_BASE + '/oauth/streamdeck/me', {
        headers: { 'x-nexus-api-key': settings.apiKey }
      });
      const data = await res.json();
      if (data.username) {
        onAuthenticated(data.username);
      } else {
        setStatus('Session expired — reconnect', 'err');
      }
    } catch {}
  }

  async function onAuthenticated(username) {
    const btn = document.getElementById('connect-btn');
    btn.textContent = 'Reconnect Nexus';
    btn.disabled = false;
    setStatus(username ? '✓ Connected as ' + username : '✓ Connected', 'ok');
    document.getElementById('settings-section').classList.add('visible');
    showActionFields();
    await loadTeammates();
    // Push key directly to plugin process — more reliable than global settings
    if (settings.apiKey) {
      send({ event: 'sendToPlugin', context, payload: { type: 'apiKey', apiKey: settings.apiKey } });
    }
  }

  function showActionFields() {
    const needsMember = ['com.nexus.streamdeck.raid-radar', 'com.nexus.streamdeck.team-shoutout'];
    const needsCategory = ['com.nexus.streamdeck.category-switcher'];
    if (needsMember.includes(actionUUID)) document.getElementById('field-member').classList.add('visible');
    if (needsCategory.includes(actionUUID)) document.getElementById('field-category').classList.add('visible');
  }

  async function loadTeammates() {
    if (!settings.apiKey) return;
    try {
      const res = await fetch(NEXUS_BASE + '/api/streamdeck/team', {
        headers: { 'x-nexus-api-key': settings.apiKey }
      });
      const data = await res.json();
      const sel = document.getElementById('member-select');
      if (data.members && data.members.length) {
        sel.innerHTML = data.members.map(m =>
          `<option value="${m.username}" ${settings.member === m.username ? 'selected' : ''}>${m.displayName}${m.isLive ? ' 🔴' : ''}</option>`
        ).join('');
      } else {
        sel.innerHTML = '<option value="">No teammates found</option>';
      }
    } catch {}
  }
</script>
</body>
</html>
